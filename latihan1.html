<!-- penandaan dokumen ini HTML5 -->
<!DOCTYPE html>
<!-- lang ini menentukan bahasa yag akan digunakan dalam web kita  -->
<html lang="id">   
<!-- ini adalah bagian meta data, ini tidak ditampilkan dalam web-->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Latihan HTML Dasar</title>
</head>
<!-- ini bagian konten di dalam browser -->
<body>
    <!-- ini bagian heading 1 -->
  <h1>HTML Dasar</h1>
  <!-- ini adalah garis -->
  <hr>
  <!-- Contoh paragraf dengan beberapa tag teks -->
   <!-- disini terdapat paragraf yang terdiri dari teks yang di perjelas dan ada yang menggunakan indeks atau pangkat -->
  <p>
    <strong>HyperText Markup Language</strong> adalah <em>bahasa markup</em>
    untuk menyusun halaman web.<br>
    Contoh notasi: O(n<sup>2</sup>) dan H<sub>2</sub>O.
  </p>
  <p><small> &copy; 2026 - Praktikum Web</small></p>
</body>
</html>
